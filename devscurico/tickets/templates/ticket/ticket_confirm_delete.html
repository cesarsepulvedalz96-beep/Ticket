{% extends "base.html" %}
{% block title %}Eliminar Ticket{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-6 text-center">
    <div class="card shadow-sm">
      <div class="card-body">
        <h3 class="mb-3">¿Eliminar el Ticket #{{ ticket.id }}?</h3>
        <p class="mb-4 text-muted">{{ ticket.descripcion|truncatechars:100 }}</p>
        <form method="post">
          {% csrf_token %}
          <button type="submit" class="btn btn-danger mx-2">Sí, eliminar</button>
          <a href="{% url 'tickets:ticket_list' %}" class="btn btn-secondary mx-2">Cancelar</a>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
